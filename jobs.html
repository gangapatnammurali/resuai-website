<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResuAI – Browse Jobs</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050d1a;--bg2:#0a1628;--bg3:#0f1e35;--accent:#3b82f6;--accent2:#06b6d4;--text:#f0f6ff;--muted:#7a96b8;--border:rgba(59,130,246,0.15);--card:rgba(15,30,53,0.7);--sidebar-w:240px;--green:#22c55e}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
.grid-bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(59,130,246,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
aside{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:50;display:flex;flex-direction:column;padding:1.5rem 0;overflow-y:auto}
.sidebar-logo{padding:0 1.5rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.sidebar-logo a{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--text);text-decoration:none}.sidebar-logo a span{color:var(--accent)}
.nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.65rem 1.5rem;color:var(--muted);text-decoration:none;font-size:0.88rem;transition:all 0.2s;border-left:2px solid transparent}
.nav-item:hover{background:rgba(59,130,246,0.05);color:var(--text);border-left-color:rgba(59,130,246,0.3)}
.nav-item.active{background:rgba(59,130,246,0.08);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.sidebar-user{padding:1.2rem 1.5rem;border-top:1px solid var(--border);margin-top:auto;display:flex;align-items:center;gap:0.7rem}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0}
.main-content{margin-left:var(--sidebar-w);flex:1;padding:2rem 2.5rem;position:relative;z-index:1}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.topbar h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800}
.search-bar{display:flex;gap:0.5rem;flex:1;max-width:500px}
.search-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.65rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--muted)}
.search-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0.65rem 1.2rem;font-size:0.9rem;cursor:pointer}
.layout{display:grid;grid-template-columns:220px 1fr;gap:1.5rem;align-items:start}
.filters-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;position:sticky;top:1rem}
.filter-title{font-size:0.78rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:0.8rem;margin-top:0.8rem;display:block}
.filter-title:first-child{margin-top:0}
.filter-option{display:flex;align-items:center;gap:0.5rem;padding:0.3rem 0;cursor:pointer}
.filter-option input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px}
.filter-option label{font-size:0.85rem;color:var(--muted);cursor:pointer}
.filter-option:hover label{color:var(--text)}
.clear-btn{width:100%;margin-top:1rem;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:0.5rem;font-size:0.82rem;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.clear-btn:hover{border-color:var(--accent);color:var(--accent)}
.results-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem}
.results-meta span{font-size:0.85rem;color:var(--muted)}
.job-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.3rem 1.5rem;margin-bottom:0.8rem;display:flex;align-items:flex-start;gap:1rem;transition:border-color 0.2s,box-shadow 0.2s}
.job-card:hover{border-color:rgba(59,130,246,0.35);box-shadow:0 4px 20px rgba(59,130,246,0.06)}
.company-logo{width:46px;height:46px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.job-info{flex:1}
.job-info h3{font-size:0.98rem;font-weight:600;margin-bottom:0.25rem}
.job-meta{display:flex;gap:0.7rem;flex-wrap:wrap;margin-bottom:0.5rem}
.job-meta span{font-size:0.78rem;color:var(--muted)}
.job-tags{display:flex;gap:0.4rem;flex-wrap:wrap}
.job-tag{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:0.15rem 0.5rem;font-size:0.72rem;color:var(--muted)}
.job-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.6rem;min-width:110px}
.match-badge{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:100px;padding:0.25rem 0.7rem;font-size:0.78rem;font-weight:600;color:#93c5fd}
.match-badge.high{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.2);color:#86efac}
.apply-btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:0.45rem 1rem;font-size:0.82rem;font-weight:500;cursor:pointer;transition:background 0.2s,transform 0.15s;width:100%;text-align:center}
.apply-btn:hover{background:#2563eb;transform:translateY(-1px)}
.apply-btn.applied{background:var(--green);cursor:default;transform:none}
.save-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:0.78rem;padding:0.3rem 0.7rem;cursor:pointer;width:100%;text-align:center;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.save-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── APPLY MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative}
.modal::-webkit-scrollbar{width:4px}.modal::-webkit-scrollbar-track{background:var(--bg3)}.modal::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:0.25rem;transition:color 0.2s}
.modal-close:hover{color:var(--text)}
.modal-header{margin-bottom:1.5rem}
.modal-header h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:0.3rem}
.modal-header p{color:var(--muted);font-size:0.85rem}
.job-preview{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:0.9rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.8rem}
.job-preview-icon{font-size:1.4rem}
.job-preview-info strong{display:block;font-size:0.92rem;font-weight:600}
.job-preview-info span{font-size:0.78rem;color:var(--muted)}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:0.82rem;color:var(--muted);margin-bottom:0.35rem;font-weight:500}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.7rem 0.9rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.form-group textarea{min-height:100px;resize:vertical;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
.submit-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;padding:0.85rem;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:transform 0.15s,box-shadow 0.2s;margin-top:0.5rem}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.3)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.success-modal{text-align:center;padding:1.5rem}
.success-modal .si{font-size:3rem;display:block;margin-bottom:1rem}
.success-modal h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:0.5rem}
.success-modal p{color:var(--muted);font-size:0.88rem;margin-bottom:1.5rem}
.success-modal .close-success{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0.65rem 1.8rem;font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer}
@media(max-width:900px){aside{display:none}.main-content{margin-left:0}.layout{grid-template-columns:1fr}.filters-panel{display:none}}
</style>
</head>
<body>
<div class="grid-bg"></div>

<aside>
  <div class="sidebar-logo"><a href="index.html">Resu<span>AI</span></a></div>
  <a class="nav-item" href="dashboard.html">📊 Dashboard</a>
  <a class="nav-item active" href="jobs.html">💼 Browse Jobs</a>
  <a class="nav-item" href="upload.html">📄 My Resume</a>
  <a class="nav-item" href="jd-match.html">🎯 JD Match</a>
  <a class="nav-item" href="login.html">🚪 Sign Out</a>
  <div class="sidebar-user">
    <div class="user-avatar" id="userInitials">KG</div>
    <div>
      <div style="font-size:0.85rem;font-weight:500" id="userName">Keerthi G.</div>
      <div style="font-size:0.75rem;color:var(--muted)">Job Seeker</div>
    </div>
  </div>
</aside>

<div class="main-content">
  <div class="topbar">
    <h1>Browse Jobs</h1>
    <div class="search-bar">
      <input class="search-input" type="text" placeholder="Search jobs, skills, companies..." id="searchInput"/>
      <button class="search-btn" onclick="searchJobs()">🔍</button>
    </div>
  </div>

  <div class="layout">
    <div class="filters-panel">
      <span class="filter-title">Job Type</span>
      <div class="filter-option"><input type="checkbox" id="ft1" checked onchange="applyFilters()"/><label for="ft1">Full Time</label></div>
      <div class="filter-option"><input type="checkbox" id="ft2" onchange="applyFilters()"/><label for="ft2">Part Time</label></div>
      <div class="filter-option"><input type="checkbox" id="ft3" onchange="applyFilters()"/><label for="ft3">Remote</label></div>
      <div class="filter-option"><input type="checkbox" id="ft4" onchange="applyFilters()"/><label for="ft4">Internship</label></div>
      <span class="filter-title">Location</span>
      <div class="filter-option"><input type="checkbox" id="l1" checked onchange="applyFilters()"/><label for="l1">Hyderabad</label></div>
      <div class="filter-option"><input type="checkbox" id="l2" onchange="applyFilters()"/><label for="l2">Bengaluru</label></div>
      <div class="filter-option"><input type="checkbox" id="l3" onchange="applyFilters()"/><label for="l3">Remote</label></div>
      <div class="filter-option"><input type="checkbox" id="l4" onchange="applyFilters()"/><label for="l4">Chennai</label></div>
      <button class="clear-btn" onclick="clearFilters()">Clear Filters</button>
    </div>

    <div>
      <div class="results-meta">
        <span id="jobCount">Loading jobs...</span>
      </div>
      <div id="jobsList"></div>
    </div>
  </div>
</div>

<!-- APPLY MODAL -->
<div class="modal-overlay" id="applyModal">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <!-- Content injected by JS -->
  </div>
</div>

<script>
const API = 'https://resuai-website.onrender.com';
let allJobs = [];
let currentJob = null;

// Load user info
const user = JSON.parse(localStorage.getItem('resuai_user') || '{}');
if(user.first_name) {
  document.getElementById('userName').textContent = user.first_name + ' ' + (user.last_name||'');
  document.getElementById('userInitials').textContent = (user.first_name[0]||'U') + (user.last_name?.[0]||'');
}

// Load jobs on page load
window.addEventListener('load', loadJobs);

async function loadJobs() {
  document.getElementById('jobCount').textContent = 'Loading jobs...';
  try {
    const res = await fetch(`${API}/api/jobs/`);
    const data = await res.json();
    allJobs = Array.isArray(data) ? data : [];
    renderJobs(allJobs);
  } catch(err) {
    // Use sample data if API fails (server sleeping)
    allJobs = getSampleJobs();
    renderJobs(allJobs);
  }
}

function getSampleJobs() {
  return [
    {id:1,title:'Data Analyst',company:'TCS',location:'Hyderabad',job_type:'Full Time',salary:'₹4–7 LPA',required_skills:['SQL','Python','Excel'],experience_req:0,match_score:94},
    {id:2,title:'Business Analyst',company:'Infosys',location:'Bengaluru',job_type:'Full Time',salary:'₹5–9 LPA',required_skills:['SQL','Excel','Communication'],experience_req:0,match_score:87},
    {id:3,title:'Junior Data Analyst',company:'Wipro',location:'Remote',job_type:'Contract',salary:'₹3–6 LPA',required_skills:['Python','MySQL','Excel'],experience_req:0,match_score:83},
    {id:4,title:'BI Analyst',company:'Tech Mahindra',location:'Hyderabad',job_type:'Full Time',salary:'₹5–10 LPA',required_skills:['Power BI','SQL'],experience_req:1,match_score:75},
    {id:5,title:'Data Analyst Intern',company:'Fintech Startup',location:'Remote',job_type:'Internship',salary:'₹8k–15k/mo',required_skills:['Python','SQL','Excel'],experience_req:0,match_score:91},
    {id:6,title:'Analyst Trainee',company:'Accenture',location:'Hyderabad',job_type:'Full Time',salary:'₹3.5–5 LPA',required_skills:['Excel','Communication'],experience_req:0,match_score:79},
    {id:7,title:'SQL Developer',company:'HCL',location:'Chennai',job_type:'Full Time',salary:'₹4–8 LPA',required_skills:['SQL','MySQL','Python'],experience_req:1,match_score:72},
    {id:8,title:'Data Operations Analyst',company:'Cognizant',location:'Pune',job_type:'Full Time',salary:'₹3–5 LPA',required_skills:['Excel','SQL'],experience_req:0,match_score:68},
  ];
}

const icons = ['🔵','🟣','🟠','🟢','🔷','🔴','🟡','💙'];

function renderJobs(jobs) {
  const applied = JSON.parse(localStorage.getItem('applied_jobs') || '[]');
  document.getElementById('jobCount').textContent = `Showing ${jobs.length} jobs`;
  if(!jobs.length) {
    document.getElementById('jobsList').innerHTML = '<div style="text-align:center;color:var(--muted);padding:3rem">No jobs found matching your filters.</div>';
    return;
  }
  document.getElementById('jobsList').innerHTML = jobs.map((j,i) => {
    const score = j.match_score || Math.floor(Math.random()*25+65);
    const isApplied = applied.includes(j.id);
    const isHigh = score >= 85;
    return `<div class="job-card">
      <div class="company-logo">${icons[i%icons.length]}</div>
      <div class="job-info">
        <h3>${j.title}</h3>
        <div class="job-meta">
          <span>🏢 ${j.company}</span>
          <span>📍 ${j.location}</span>
          <span>💰 ${j.salary||'Competitive'}</span>
          <span>⏰ ${j.job_type}</span>
          ${j.experience_req===0?'<span style="color:#86efac">✓ Freshers OK</span>':''}
        </div>
        <div class="job-tags">
          ${(j.required_skills||[]).slice(0,4).map(s=>`<span class="job-tag">${s}</span>`).join('')}
        </div>
      </div>
      <div class="job-right">
        <span class="match-badge ${isHigh?'high':''}">${score}% match</span>
        <button class="apply-btn ${isApplied?'applied':''}" id="applyBtn${j.id}" onclick="${isApplied?'':'openApplyModal('+j.id+','+JSON.stringify(j).replace(/"/g,"'")+')'}">
          ${isApplied?'✓ Applied!':'Apply Now →'}
        </button>
        <button class="save-btn" id="saveBtn${j.id}" onclick="saveJob(${j.id},this)">🔖 Save</button>
      </div>
    </div>`;
  }).join('');
}

function openApplyModal(jobId, job) {
  currentJob = {id:jobId, ...job};
  const user = JSON.parse(localStorage.getItem('resuai_user')||'{}');
  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <h2>Apply for This Job</h2>
      <p>Fill in your details and submit your application</p>
    </div>
    <div class="job-preview">
      <div class="job-preview-icon">💼</div>
      <div class="job-preview-info">
        <strong>${job.title || job.title}</strong>
        <span>${job.company} · ${job.location} · ${job.salary||'Competitive'}</span>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="applyName" placeholder="Your full name" value="${user.first_name||''} ${user.last_name||''}"/>
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" id="applyPhone" placeholder="+91 98765 43210" value="${user.phone||''}"/>
      </div>
    </div>
    <div class="form-group">
      <label>Email Address *</label>
      <input type="email" id="applyEmail" placeholder="your@email.com" value="${user.email||''}"/>
    </div>
    <div class="form-group">
      <label>Years of Experience</label>
      <select id="applyExp">
        <option value="0">Fresher (0 years)</option>
        <option value="0.5">Less than 1 year</option>
        <option value="1">1 year</option>
        <option value="2">2 years</option>
        <option value="3">3+ years</option>
      </select>
    </div>
    <div class="form-group">
      <label>Cover Letter <span style="color:var(--muted);font-weight:400">(optional but recommended)</span></label>
      <textarea id="applyCoverLetter" placeholder="Write a brief message about why you are a good fit for this role...&#10;&#10;Example: I am excited to apply for the ${job.title||'this'} role at ${job.company}. I have strong SQL and Python skills and have completed several data analysis projects. I am a quick learner and eager to contribute from Day 1."></textarea>
    </div>
    <div class="form-group">
      <label>LinkedIn Profile <span style="color:var(--muted);font-weight:400">(optional)</span></label>
      <input type="url" id="applyLinkedIn" placeholder="https://linkedin.com/in/yourprofile"/>
    </div>
    <button class="submit-btn" id="submitAppBtn" onclick="submitApplication()">🚀 Submit Application</button>`;
  document.getElementById('applyModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

async function submitApplication() {
  const name = document.getElementById('applyName').value.trim();
  const email = document.getElementById('applyEmail').value.trim();
  const phone = document.getElementById('applyPhone').value.trim();
  const coverLetter = document.getElementById('applyCoverLetter').value.trim();
  if(!name || !email || !phone) { alert('Please fill in your name, email and phone number.'); return; }

  const btn = document.getElementById('submitAppBtn');
  btn.textContent = 'Submitting...';
  btn.disabled = true;

  const token = localStorage.getItem('resuai_token');
  try {
    if(token) {
      const res = await fetch(`${API}/api/jobs/apply/${currentJob.id}`, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body: JSON.stringify({full_name:name, email, phone, cover_letter:coverLetter})
      });
      // Even if API fails, save locally
    }
  } catch(e) { console.log('API apply failed, saving locally'); }

  // Save applied status locally
  const applied = JSON.parse(localStorage.getItem('applied_jobs')||'[]');
  if(!applied.includes(currentJob.id)) { applied.push(currentJob.id); localStorage.setItem('applied_jobs', JSON.stringify(applied)); }

  // Show success
  document.getElementById('modalContent').innerHTML = `
    <div class="success-modal">
      <span class="si">🎉</span>
      <h2>Application Submitted!</h2>
      <p>Your application for <strong>${currentJob.title}</strong> at <strong>${currentJob.company}</strong> has been submitted successfully!</p>
      <p style="margin-bottom:1.5rem;font-size:0.82rem">We have saved your application. The employer will review it and contact you if shortlisted.</p>
      <button class="close-success" onclick="closeModalAndUpdate(${currentJob.id})">View My Applications →</button>
    </div>`;

  // Update the apply button in the list
  const applyBtn = document.getElementById(`applyBtn${currentJob.id}`);
  if(applyBtn) { applyBtn.textContent='✓ Applied!'; applyBtn.classList.add('applied'); applyBtn.onclick=null; }
}

function closeModalAndUpdate(jobId) {
  closeModal();
  window.location.href = 'dashboard.html';
}

function closeModal() {
  document.getElementById('applyModal').classList.remove('open');
  document.body.style.overflow = '';
}

function saveJob(id, btn) {
  btn.textContent = '✓ Saved';
  btn.style.color = '#22c55e';
  btn.style.borderColor = 'rgba(34,197,94,0.3)';
}

function searchJobs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allJobs.filter(j =>
    j.title.toLowerCase().includes(q) ||
    j.company.toLowerCase().includes(q) ||
    (j.required_skills||[]).some(s=>s.toLowerCase().includes(q))
  );
  renderJobs(filtered);
}

document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') searchJobs(); });

function applyFilters() { renderJobs(allJobs); }
function clearFilters() {
  ['ft1','ft2','ft3','ft4','l1','l2','l3','l4'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=false;});
  renderJobs(allJobs);
}

// Close modal on overlay click
document.getElementById('applyModal').addEventListener('click', function(e) {
  if(e.target===this) closeModal();
});
</script>
</body>
</html>
